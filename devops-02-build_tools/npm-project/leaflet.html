<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Map Example</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="node_modules/leaflet/dist/leaflet.css">

    <style>
        #map {
            height: 400px;
            width: 100%;
            border: 2px solid #444;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h1>Leaflet.js Demo Map</h1>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="node_modules/leaflet/dist/leaflet.js"></script>

    <script>
        // Create map centered on Zurich
        const map = L.map('map').setView([47.3769, 8.5417], 13);

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Add a marker
        const marker = L.marker([47.3769, 8.5417]).addTo(map);
        marker.bindPopup("<b>Hello from Zurich!</b><br>This is a Leaflet marker.").openPopup();
    </script>

</body>

</html>
